{% extends "layout.html" %}

{% block title %}データ解析ページ：アクセスログ解析ツール{% endblock %}

{% block content %}
<h2 class="heading-18">📉アクセスログ解析ツール</h2>
<br>
<div class="box-012">
    <span>確認</span>
    <p>以下のデータを削除しますか？</p>
</div>
<br>

<div class="table-container">
<table border="1">

 <thead>
    <tr> 
        <th>id</th>
        <th>IpId</th>
        <th>TimeStamp</th> <th>HttpMethod</th>    <th>Uri (URL)</th> <th>Status</th>    <th>Bytes</th>     <th>Referrer</th>
        <th>UserAgent</th>
    </tr> 
</thead>
<tbody>
  <tr>
    {% for value in log %}
      <td>{{value}}</td>
    {% endfor %}
  </tr>
</tbody>


</table>
</div>
<form action="/delete_complete" method="POST">
    <button type="submit" class="button-confirm">OK（削除を確定する）</button>
    <br>
    <a href="/delete_select" class="button-cancel">キャンセル</a>
</form>
<br>

<a href="/delete_select">戻る</a>
<a href="/main">トップへ戻る</a>
</div>



<style>
    /* 表全体のデザイン */
/* 1. テーブルを囲む箱の設定：はみ出したら横スクロールさせる */
    .table-container {
        width: 100%;
        overflow-x: auto; /* 横方向にはみ出したらスクロールバーを出す */
        -webkit-overflow-scrolling: touch; /* スマホでスルスル動くようにする */
    }

    /* 2. テーブル自体の設定：最低限の幅を確保しつつ、基本は100% */
    table {
        width: 100%;
        min-width: 800px; /* 💡ここがポイント！項目が多いので、これより狭くならないようにして文字崩れを防ぐ */
        border-collapse: collapse;
        margin-top: 20px;
        background-color: #fff;
        table-layout: auto; /* 内容に合わせて幅を自動調整 */
    }

    /* 文字が重ならないように余白を調整 */
    th, td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        white-space: nowrap; /* 💡文字を勝手に改行させない（1行でピシッと見せる） */
    }
</style>

<script>

</script>
{% endblock %}
